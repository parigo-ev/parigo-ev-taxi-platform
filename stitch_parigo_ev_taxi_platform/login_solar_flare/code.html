<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Parigo - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "surface": "#1a0935",
                        "surface-container": "#271642",
                        "secondary-fixed-dim": "#deb7ff",
                        "on-surface-variant": "#e0c0af",
                        "primary": "#ffb68b",
                        "on-error": "#690005",
                        "surface-container-low": "#23123d",
                        "tertiary-fixed-dim": "#e9c400",
                        "on-tertiary-container": "#423600",
                        "on-secondary-container": "#d4a5ff",
                        "on-primary-container": "#5c2800",
                        "on-tertiary": "#3a3000",
                        "tertiary-container": "#bd9e00",
                        "secondary-container": "#6b13af",
                        "primary-container": "#ff7a00",
                        "primary-fixed": "#ffdbc8",
                        "on-tertiary-fixed": "#221b00",
                        "on-surface": "#ecdcff",
                        "inverse-primary": "#994700",
                        "surface-dim": "#1a0935",
                        "surface-container-high": "#32214d",
                        "on-primary-fixed-variant": "#753400",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#321200",
                        "inverse-surface": "#ecdcff",
                        "surface-tint": "#ffb68b",
                        "primary-fixed-dim": "#ffb68b",
                        "on-secondary-fixed-variant": "#680eac",
                        "on-secondary-fixed": "#2d0050",
                        "secondary-fixed": "#f1dbff",
                        "on-error-container": "#ffdad6",
                        "outline": "#a78b7c",

                    },
                    "borderRadius": {

                    "spacing": {

                        "margin": "24px",
                        "sm": "12px",

                        "gutter": "20px",

                        "lg": "40px"
                    },
                    "fontFamily": {
                        "label-sm": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #1a0935; /* surface */
            background-image: radial-gradient(circle at 80% 20%, rgba(255, 122, 0, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 20% 80%, rgba(107, 19, 175, 0.2) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .input-well {
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        
        .input-well:focus-within {
            border-color: rgba(255, 122, 0, 0.5);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 15px rgba(255, 122, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff7a00, #ffb68b);
            box-shadow: 0 4px 15px rgba(255, 122, 0, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(255, 122, 0, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.1);
        }
        
        /* 3D Asset Floating effect */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased flex flex-col items-center justify-center p-md overflow-x-hidden">
<!-- Ambient Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-secondary-container opacity-20 blur-[100px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-primary-container opacity-10 blur-[120px] pointer-events-none z-0"></div>
<!-- Main Container -->
<main class="w-full max-w-[420px] relative z-10 flex flex-col gap-xl mt-xl">
<!-- Header / Brand -->
<header class="flex flex-col items-center text-center gap-sm">
<h1 class="font-display text-display text-transparent bg-clip-text bg-gradient-to-r from-primary-container to-primary">PARIGO</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Electrify your journey.</p>
</header>
<!-- 3D Illustration Element (Simulated via an image for the prompt) -->
<div class="w-full flex justify-center mb-[-2rem] relative z-20 pointer-events-none animate-float">
<img alt="3D Decorative Element" class="w-[180px] h-[180px] object-cover rounded-full mix-blend-screen opacity-80" data-alt="A high-gloss, cartoonish 3D rendering of an electric vehicle charging plug or a stylized lightning bolt. The object appears tactile and chunky, hovering mid-air. It is illuminated by a warm, vibrant orange 'solar flare' light source from the top right, casting soft purple-tinted ambient shadows. The background is isolated, allowing it to blend seamlessly into a deep purple glassmorphic UI. The overall aesthetic is Gen Z, energetic, and surrealistic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3h-n1xptWL5PA_q9UWiCI-j6dcXlYzMeFkoCTZ42d4du6GBywMzgdRBQblE-feJ4ZuefNkHSzKpK-f_1MfXykuWjbfcJkdL6wrFeNjLV7tVhHd6ZFnT0KUFF9-Wd8H5TBdrGU1eS_r6c0gZXqf-EGBM260miBZgOWmHVTkOwE_r20D5Mat1Vlt04hUz0XmaM3s9Qa7yhLIegL8uzc1vKNoPIfut3N2IW3vGHZ5uR6bCL5OLvJqZwEGFHL5zWccpmHJIzyI0ZZ8cXa"/>
</div>
<!-- Login Card -->
<section class="glass-card rounded-xl p-lg flex flex-col gap-md relative z-10">
<div class="flex flex-col gap-xs mb-sm">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your mobile number to ignite.</p>
</div>
<!-- Phone Input Form -->
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-secondary uppercase tracking-widest pl-sm" for="phone">Mobile Number</label>
<div class="input-well rounded-full flex items-center px-md py-sm h-[56px]">
<span class="font-body-lg text-body-lg text-on-surface-variant mr-sm">+1</span>
<div class="h-full w-[1px] bg-white/10 mr-sm"></div>
<input class="bg-transparent border-none outline-none text-on-surface font-body-lg text-body-lg w-full placeholder:text-on-surface-variant/30 focus:ring-0 p-0" id="phone" placeholder="000 000 0000" type="tel"/>
<span class="material-symbols-outlined text-primary-container ml-sm" data-icon="phone_iphone">phone_iphone</span>
</div>
</div>
<div class="pt-sm">
<button class="btn-primary w-full rounded-full py-md px-lg flex items-center justify-center gap-sm group" type="button">
<span class="font-label-bold text-label-bold text-on-primary uppercase tracking-widest">Send OTP</span>
<span class="material-symbols-outlined text-on-primary group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm my-xs">
<div class="h-[1px] bg-white/10 flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">OR</span>
<div class="h-[1px] bg-white/10 flex-1"></div>
</div>
<!-- Alternative Login -->
<button class="glass-card rounded-full py-sm px-md flex items-center justify-center gap-sm border border-white/5 hover:border-primary-container/30 transition-colors" type="button">
<span class="material-symbols-outlined text-on-surface" data-icon="mail">mail</span>
<span class="font-label-bold text-label-bold text-on-surface">Continue with Email</span>
</button>
</section>
<!-- Footer Links -->
<footer class="flex justify-center gap-lg mt-auto pb-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
</footer>
</main>
</body></html>
