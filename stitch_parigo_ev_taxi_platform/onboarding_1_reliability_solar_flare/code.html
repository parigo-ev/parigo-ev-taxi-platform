<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<!-- Typography Content -->
<div class="flex flex-col gap-sm text-center">
<h1 class="font-display text-display text-on-surface tracking-tight">No More Cancellations</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-sm">Reliable rides, every time you book.</p>
</div>

<div class="flex flex-col gap-lg mt-sm">
<!-- Progress Indicators -->
<div class="flex justify-center items-center gap-base">
<!-- Active Chip -->
<div class="w-10 h-2.5 rounded-full bg-primary-container glow-primary relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-white/20 to-transparent"></div>
</div>

<div class="w-2.5 h-2.5 rounded-full bg-surface-container-high border border-outline/20"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-high border border-outline/20"></div>
</div>
