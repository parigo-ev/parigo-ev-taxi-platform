<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Parigo - Select Role</title>
<!-- Google Fonts: Space Grotesk -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed": "#221b00",

                        "outline": "#a78b7c",

                        "error-container": "#93000a",
                        "secondary-fixed": "#f1dbff",
                        "surface-container-highest": "#3d2c58",
                        "inverse-on-surface": "#382854",
                        "tertiary-fixed": "#ffe170",
                        "surface-variant": "#3d2c58",
                        "secondary-fixed-dim": "#deb7ff",
                        "on-primary-container": "#5c2800",
                        "surface-tint": "#ffb68b",
                        "tertiary-container": "#bd9e00",
                        "primary-container": "#ff7a00",
                        "on-primary-fixed": "#321200",
                        "secondary": "#deb7ff",
                        "on-error-container": "#ffdad6",
                        "surface-bright": "#41315d",
                        "on-tertiary": "#3a3000",
                        "inverse-primary": "#994700",
                        "on-primary-fixed-variant": "#753400",
                        "surface-container-high": "#32214d",
                        "secondary-container": "#6b13af",
                        "surface": "#1a0935",
                        "on-secondary-container": "#d4a5ff",
                        "primary": "#ffb68b",
                        "surface-container": "#271642",
                        "inverse-surface": "#ecdcff",
                        "tertiary": "#e9c400",
                        "background": "#1a0935",
                        "primary-fixed-dim": "#ffb68b",
                        "on-surface": "#ecdcff",
                        "primary-fixed": "#ffdbc8",
                        "on-background": "#ecdcff",
                        "on-error": "#690005",
                        "on-secondary-fixed": "#2d0050",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-primary": "#522300",
                        "on-secondary-fixed-variant": "#680eac",
                        "on-tertiary-container": "#423600",
                        "on-secondary": "#4a007f",
                        "tertiary-fixed-dim": "#e9c400",
                        "on-surface-variant": "#e0c0af",
                        "error": "#ffb4ab",
                        "surface-container-low": "#23123d",
                        "surface-container-lowest": "#150330"
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        lg: "2rem",
                        xl: "3rem",
                        full: "9999px"
                    },
                    spacing: {
                        base: "8px",
                        xl: "64px",
                        gutter: "20px",
                        sm: "12px",
                        lg: "40px",
                        md: "24px",
                        xs: "4px",
                        margin: "24px"
                    },
                    fontFamily: {
                        "body-lg": ["Space Grotesk"],
                        "body-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "label-sm": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "label-bold": ["Space Grotesk"],
                        "display": ["Space Grotesk"]
                    },
                    fontSize: {
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "700" }],
                        "label-sm": ["12px", { lineHeight: "1.0", fontWeight: "500" }],

                        "display": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }]

                }
            }
        }

<style>
        /* Custom Utilities for Solar Flare Aesthetic */
        .glass-card {
            background: linear-gradient(180deg, rgba(61, 44, 88, 0.4) 0%, rgba(39, 22, 66, 0.2) 100%);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .solar-glow {
            box-shadow: 0 0 40px rgba(255, 122, 0, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen relative overflow-hidden flex flex-col">
<!-- Ambient 3D Solar Flare Background -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
<!-- Deep Space Core -->
<div class="absolute top-[-20%] left-[-10%] w-[120%] h-[120%] bg-[radial-gradient(ellipse_at_top,_var(--tw-colors-surface-container-high),_transparent_70%)] opacity-60"></div>
<!-- Solar Flare Orange Blob -->
<div class="absolute top-0 right-0 w-[80vw] h-[80vw] bg-primary-container rounded-full mix-blend-screen filter blur-[120px] opacity-20 translate-x-1/3 -translate-y-1/3"></div>
<!-- Deep Purple Atmosphere -->
<div class="absolute bottom-0 left-0 w-[100vw] h-[100vw] bg-secondary-container rounded-full mix-blend-multiply filter blur-[140px] opacity-40 -translate-x-1/4 translate-y-1/4"></div>
</div>
<!-- Onboarding Top Bar (Navigation Suppressed) -->
<header class="relative z-50 w-full px-margin py-md flex justify-between items-center">
<!-- Brand Logo (Sourced from JSON style anchor) -->
<div class="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-orange-600">
            PARIGO
        </div>
<!-- Theme Toggle (Decorative/Interactive Element) -->
<div class="flex items-center bg-surface-container-highest/50 backdrop-blur-md rounded-full p-1 border border-white/5 shadow-inner">
<button aria-label="Light Mode" class="p-2 rounded-full text-surface-tint hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[18px]">light_mode</span>
</button>
<button aria-label="Dark Mode" class="p-2 rounded-full bg-primary-container text-on-primary-container shadow-[0_0_12px_rgba(255,122,0,0.5)] transition-colors">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col justify-center px-margin pb-xl">
<!-- Header Section -->
<div class="mb-lg">
<h1 class="font-display text-display text-on-surface mb-xs drop-shadow-md">
                Choose <br/>
<span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-container">Your Path</span>
</h1>
<p class="font-body-lg text-body-lg text-surface-tint opacity-80 max-w-[280px]">
                Select how you want to experience the electric future.
            </p>
</div>
<!-- Role Selection Cards Container -->
<div class="flex flex-col gap-sm">
<!-- Customer Card -->
<button class="glass-card group w-full text-left rounded-xl p-md flex items-center gap-md transition-all duration-300 hover:-translate-y-1 hover:solar-glow active:scale-95 active:duration-150">
<!-- 3D-ish Icon Container -->
<div class="relative w-16 h-16 rounded-lg bg-surface-bright/40 flex items-center justify-center border border-white/10 shadow-inner group-hover:bg-primary-container/20 transition-colors">
<div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent rounded-lg opacity-50"></div>
<span class="material-symbols-outlined text-[32px] text-primary drop-shadow-[0_0_8px_rgba(255,182,139,0.5)] group-hover:text-primary-fixed group-hover:scale-110 transition-all" style="font-variation-settings: 'FILL' 1;">
                        electric_car
                    </span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Customer</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">Find chargers &amp; juice up.</p>
</div>
<span class="material-symbols-outlined text-surface-tint opacity-30 group-hover:opacity-100 group-hover:text-primary group-hover:translate-x-1 transition-all">
                    chevron_right
                </span>
</button>
<!-- Driver Card -->
<button class="glass-card group w-full text-left rounded-xl p-md flex items-center gap-md transition-all duration-300 hover:-translate-y-1 hover:solar-glow active:scale-95 active:duration-150">
<div class="relative w-16 h-16 rounded-lg bg-surface-bright/40 flex items-center justify-center border border-white/10 shadow-inner group-hover:bg-primary-container/20 transition-colors">
<div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent rounded-lg opacity-50"></div>
<span class="material-symbols-outlined text-[32px] text-primary drop-shadow-[0_0_8px_rgba(255,182,139,0.5)] group-hover:text-primary-fixed group-hover:scale-110 transition-all" style="font-variation-settings: 'FILL' 1;">
                        local_taxi
                    </span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Driver</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">Manage rides &amp; earnings.</p>
</div>
<span class="material-symbols-outlined text-surface-tint opacity-30 group-hover:opacity-100 group-hover:text-primary group-hover:translate-x-1 transition-all">
                    chevron_right
                </span>
</button>
<!-- Admin Card -->
<button class="glass-card group w-full text-left rounded-xl p-md flex items-center gap-md transition-all duration-300 hover:-translate-y-1 hover:solar-glow active:scale-95 active:duration-150">
<div class="relative w-16 h-16 rounded-lg bg-surface-bright/40 flex items-center justify-center border border-white/10 shadow-inner group-hover:bg-primary-container/20 transition-colors">
<div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent rounded-lg opacity-50"></div>
<span class="material-symbols-outlined text-[32px] text-primary drop-shadow-[0_0_8px_rgba(255,182,139,0.5)] group-hover:text-primary-fixed group-hover:scale-110 transition-all" style="font-variation-settings: 'FILL' 1;">
                        admin_panel_settings
                    </span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Admin</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">System &amp; station control.</p>
</div>
<span class="material-symbols-outlined text-surface-tint opacity-30 group-hover:opacity-100 group-hover:text-primary group-hover:translate-x-1 transition-all">
                    chevron_right
                </span>
</button>
</div>
</main>
</body></html>
